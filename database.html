<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>FoodMolla Database</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--orange:#E8622A;--orange-pale:#FDF0EA;--bg:#F7F5F2;--white:#FFFFFF;--text:#1A1A1A;--muted:#8A8A8A;--border:#E8E4DF;--radius:14px;--shadow:0 2px 14px rgba(0,0,0,0.06);}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;}
.app{max-width:440px;margin:0 auto;padding-bottom:20px;}
header{background:var(--white);padding:12px 16px 10px;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50;}
.logo{font-family:'Playfair Display',serif;font-size:1.3rem;font-weight:800;}
.logo span{color:var(--orange);}
.header-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.search-input{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:10px;padding:9px 13px;font-family:'Inter',sans-serif;font-size:0.85rem;color:var(--text);outline:none;}
.search-input:focus{border-color:var(--orange);}
.filter-row{display:flex;gap:6px;overflow-x:auto;padding:8px 16px;scrollbar-width:none;background:var(--white);border-bottom:1px solid var(--border);}
.filter-row::-webkit-scrollbar{display:none;}
.filter-pill{flex-shrink:0;padding:5px 11px;border-radius:100px;font-size:0.68rem;font-weight:500;cursor:pointer;border:1.5px solid var(--border);background:var(--white);color:var(--muted);font-family:'Inter',sans-serif;}
.filter-pill.active{background:var(--orange);color:white;border-color:var(--orange);}
.stats-bar{background:var(--white);border-bottom:1px solid var(--border);padding:7px 16px;font-size:0.7rem;color:var(--muted);display:flex;justify-content:space-between;align-items:center;}
.content{padding:10px 14px;}
.section-header{font-size:0.72rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;margin:12px 0 7px;padding-bottom:5px;border-bottom:1px solid var(--border);}
.food-card{background:var(--white);border-radius:var(--radius);padding:10px 12px;margin-bottom:6px;box-shadow:var(--shadow);display:flex;justify-content:space-between;align-items:center;}
.fc-emoji{font-size:1.2rem;margin-right:9px;}
.fc-name{font-weight:600;font-size:0.82rem;}
.fc-macros{font-size:0.61rem;color:var(--muted);margin-top:2px;}
.fc-kcal{font-family:'Playfair Display',serif;font-size:1rem;font-weight:700;color:var(--orange);}
.fc-unit{font-size:0.59rem;color:var(--muted);}
.fc-actions{display:flex;gap:4px;margin-top:3px;justify-content:flex-end;}
.btn-edit{background:var(--orange-pale);border:none;border-radius:6px;width:24px;height:24px;cursor:pointer;font-size:0.65rem;display:flex;align-items:center;justify-content:center;}
.btn-del{background:none;border:1px solid var(--border);border-radius:6px;width:24px;height:24px;cursor:pointer;color:var(--muted);font-size:0.65rem;display:flex;align-items:center;justify-content:center;}
.btn-orange{background:var(--orange);color:white;border:none;border-radius:8px;padding:6px 12px;font-size:0.72rem;font-weight:600;cursor:pointer;font-family:Inter,sans-serif;}
.btn-sync{background:none;border:1px solid var(--border);border-radius:8px;padding:5px 10px;font-size:0.7rem;color:var(--muted);cursor:pointer;font-family:Inter,sans-serif;}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:100;display:none;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px);}
.modal-overlay.visible{display:flex;}
.modal{background:var(--white);border-radius:22px 22px 0 0;padding:18px 18px 36px;width:100%;max-width:440px;max-height:90vh;overflow-y:auto;animation:slideUp 0.22s ease;}
@keyframes slideUp{from{transform:translateY(100%);}to{transform:translateY(0);}}
.modal-handle{width:38px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 13px;}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:10px;}
.form-field label{font-size:0.61rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;display:block;margin-bottom:3px;}
.form-input-sm{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:8px;padding:7px 9px;font-family:'Inter',sans-serif;font-size:0.82rem;color:var(--text);outline:none;}
.form-input-sm:focus{border-color:var(--orange);}
.form-field.full{grid-column:1/-1;}
.emoji-row{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:9px;}
.emoji-btn{font-size:1.1rem;background:var(--bg);border:1.5px solid var(--border);border-radius:8px;width:36px;height:36px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.emoji-btn.selected{border-color:var(--orange);background:var(--orange-pale);}
.modal-actions{display:flex;gap:8px;margin-top:10px;}
.btn-full{flex:1;padding:11px;border-radius:12px;border:none;font-family:'Inter',sans-serif;font-size:0.86rem;font-weight:600;cursor:pointer;}
.btn-primary{background:var(--orange);color:white;}
.btn-secondary{background:var(--bg);color:var(--muted);border:1.5px solid var(--border);}
.empty{text-align:center;padding:40px 20px;color:var(--muted);font-size:0.82rem;}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--text);color:white;padding:9px 18px;border-radius:100px;font-size:0.78rem;font-weight:500;opacity:0;transition:all 0.3s;z-index:300;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.sync-dot{width:7px;height:7px;border-radius:50%;background:#22c55e;display:inline-block;margin-right:3px;}
.sync-dot.syncing{background:#F5B942;animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.3;}}
</style>
</head>

<div class="app">
  <header>
    <div class="header-top">
      <div class="logo">Food<span>Molla</span></div>
      <div style="display:flex;gap:6px;align-items:center">
        <span class="sync-dot" id="sync-dot"></span>
        <button class="btn-sync" onclick="syncDB()">☁ Sync</button>
        <button class="btn-orange" onclick="openAddModal()">+ Nuovo</button>
        <button class="btn-sync" onclick="location.href='index.html'">← Diario</button>
      </div>
    </div>
    <input type="search" class="search-input" id="search" placeholder="Cerca alimento..." oninput="renderList()">
  </header>
  <div class="filter-row" id="filter-row"></div>
  <div class="stats-bar"><span id="stats-text"></span></div>
  <div class="content" id="food-list"></div>
</div>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div style="font-family:'Playfair Display',serif;font-size:1rem;font-weight:700;margin-bottom:12px" id="modal-title">Aggiungi</div>

      <label>Nome</label><input type="text" class="form-input-sm" id="f-name" placeholder="Nome alimento">
    </div>
    <div style="margin-bottom:8px">
      <div style="font-size:0.61rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:5px">Icona</div>

      </div>
    </div>
    <div class="form-grid">
      <div class="form-field"><label>Kcal/100g</label><input type="number" class="form-input-sm" id="f-kcal" inputmode="decimal"></div>
      <div class="form-field"><label>Proteine g</label><input type="number" class="form-input-sm" id="f-protein" step="0.01" inputmode="decimal"></div>
      <div class="form-field"><label>Carboidrati g</label><input type="number" class="form-input-sm" id="f-carbs" step="0.01" inputmode="decimal"></div>
      <div class="form-field"><label>Zuccheri g</label><input type="number" class="form-input-sm" id="f-sugar" step="0.01" inputmode="decimal"></div>
      <div class="form-field"><label>Grassi g</label><input type="number" class="form-input-sm" id="f-fat" step="0.01" inputmode="decimal"></div>
      <div class="form-field"><label>G.Saturi g</label><input type="number" class="form-input-sm" id="f-sat" step="0.01" inputmode="decimal"></div>
      <div class="form-field"><label>Fibre g</label><input type="number" class="form-input-sm" id="f-fiber" step="0.01" inputmode="decimal"></div>
      <div class="form-field"><label>Sale g</label><input type="number" class="form-input-sm" id="f-salt" step="0.01" inputmode="decimal"></div>
    </div>
    <div class="modal-actions">
      <button class="btn-full btn-primary" onclick="saveFood()">💾 Salva</button>
      <button class="btn-full btn-secondary" onclick="closeModal()">Annulla</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

const CATS={
  'Latticini':['🥛'],'Carni':['🥩','🍗','🦃','🐰'],
  'Pesce':['🐟','🦑','🦐','🦪','🐙'],'Uova':['🍳'],
  'Formaggi':['🧀'],'Cereali':['🌾','🍞','🍝','🍚','🫓'],
  'Legumi':['🫘'],'Verdure':['🥬','🥦','🥒','🍆','🫑','🧅','🥕','🌿','🍄','🥗','🍅','🥔'],
  'Frutta':['🍎','🍌','🍊','🍑','🍐','🍇','🍓','🥝','🍉','🍈','🍍'],
  'Frutta secca':['🥜','🌰','🌲','🌴'],'Dolci':['🍫','🍪','🌽'],
  'Pizza':['🍕'],'Condimenti':['🫒'],'Altro':['🛒'],
};

let db=JSON.parse(localStorage.getItem('fm_db2')||'null')||[];
let editId=null,selEmoji='🍗',activeFilter='Tutti';

function mergeDB(){
  const ids=new Set(db.map(f=>f.id));
  BASE_DB.forEach(f=>{if(!ids.has(f.id))db.push(f);});
  saveDB();
}
function saveDB(){localStorage.setItem('fm_db2',JSON.stringify(db));}
function getCat(e){for(const[c,es]of Object.entries(CATS))if(es.includes(e))return c;return 'Altro';}

function renderFilters(){
  const counts={};
  db.forEach(f=>{const c=getCat(f.emoji);counts[c]=(counts[c]||0)+1;});
  const cats=['Tutti',...Object.keys(CATS).filter(c=>counts[c])];
  document.getElementById('filter-row').innerHTML=cats.map(c=>
    `<button class="filter-pill${c===activeFilter?' active':''}" onclick="setFilter('${c}')">${c}${c!=='Tutti'?' ('+counts[c]+')':''}</button>`
  ).join('');
}
function setFilter(c){activeFilter=c;renderFilters();renderList();}

function renderList(){
  const q=document.getElementById('search').value.toLowerCase();
  const items=db.filter(f=>(!q||f.name.toLowerCase().includes(q))&&(activeFilter==='Tutti'||getCat(f.emoji)===activeFilter));
  document.getElementById('stats-text').textContent=items.length+' di '+db.length+' alimenti';
  if(!items.length){document.getElementById('food-list').innerHTML='<div class="empty">🔍 Nessun risultato</div>';return;}
  const grouped={};
  items.forEach(f=>{const c=getCat(f.emoji);if(!grouped[c])grouped[c]=[];grouped[c].push(f);});
  document.getElementById('food-list').innerHTML=Object.entries(grouped).map(([cat,foods])=>`
    <div class="section-header">${cat} (${foods.length})</div>
    ${foods.map(f=>`<div class="food-card">
      <div style="display:flex;align-items:center;flex:1">
        <span class="fc-emoji">${f.emoji}</span>
        <div><div class="fc-name">${f.name}</div><div class="fc-macros">P:${f.protein}g · C:${f.carbs}g · G:${f.fat}g · F:${f.fiber}g</div></div>
      </div>
      <div style="text-align:right;min-width:58px">
        <div class="fc-kcal">${f.kcal}</div><div class="fc-unit">kcal/100g</div>
        <div class="fc-actions">
          <button class="btn-edit" onclick="openEditModal(${f.id})">✏️</button>
          <button class="btn-del" onclick="deleteFood(${f.id})">✕</button>
        </div>
      </div>
    </div>`).join('')}`).join('');
}

function deleteFood(id){
  if(!confirm('Rimuovere?'))return;
  db=db.filter(f=>f.id!==id);saveDB();renderFilters();renderList();
  showToast('🗑️ Rimosso');
  supaFetch('fm_foods','DELETE',null,'?id=eq.'+id+'&user_id=eq.'+USER_ID);
}

function openAddModal(){editId=null;document.getElementById('modal-title').textContent='Aggiungi alimento';
  ['f-name','f-kcal','f-protein','f-carbs','f-sugar','f-fat','f-sat','f-fiber','f-salt'].forEach(id=>document.getElementById(id).value='');
  setEmoji('🍗');document.getElementById('modal').classList.add('visible');}

function openEditModal(id){
  const f=db.find(x=>x.id===id);if(!f)return;editId=id;
  document.getElementById('modal-title').textContent='✏️ Modifica';
  document.getElementById('f-name').value=f.name;document.getElementById('f-kcal').value=f.kcal;
  document.getElementById('f-protein').value=f.protein;document.getElementById('f-carbs').value=f.carbs;
  document.getElementById('f-sugar').value=f.sugar||0;document.getElementById('f-fat').value=f.fat;
  document.getElementById('f-sat').value=f.sat||0;document.getElementById('f-fiber').value=f.fiber;
  document.getElementById('f-salt').value=f.salt||0;setEmoji(f.emoji);
  document.getElementById('modal').classList.add('visible');
}

function closeModal(){document.getElementById('modal').classList.remove('visible');}
function setEmoji(e){selEmoji=e;document.querySelectorAll('#emoji-row .emoji-btn').forEach(b=>b.classList.toggle('selected',b.dataset.emoji===e));}
document.getElementById('emoji-row').addEventListener('click',e=>{const b=e.target.closest('.emoji-btn');if(b)setEmoji(b.dataset.emoji);});
document.getElementById('modal').addEventListener('click',e=>{if(e.target===document.getElementById('modal'))closeModal();});

function saveFood(){
  const name=document.getElementById('f-name').value.trim();
  const kcal=parseFloat(document.getElementById('f-kcal').value)||0;
  if(!name||!kcal){showToast('⚠️ Nome e calorie obbligatori');return;}
  const food={id:editId||Date.now(),name,emoji:selEmoji,kcal,
    protein:parseFloat(document.getElementById('f-protein').value)||0,
    carbs:parseFloat(document.getElementById('f-carbs').value)||0,
    sugar:parseFloat(document.getElementById('f-sugar').value)||0,
    fat:parseFloat(document.getElementById('f-fat').value)||0,
    sat:parseFloat(document.getElementById('f-sat').value)||0,
    fiber:parseFloat(document.getElementById('f-fiber').value)||0,
    salt:parseFloat(document.getElementById('f-salt').value)||0};
  db=editId?db.map(f=>f.id===editId?food:f):[...db,food];
  saveDB();closeModal();renderFilters();renderList();
  showToast(editId?'✅ Aggiornato!':'✅ Aggiunto!');
  supaFetch('fm_foods','POST',{...food,user_id:USER_ID});
}

async function supaFetch(table,method='GET',body=null,extra=''){
  const opts={method,headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY,'Content-Type':'application/json','Prefer':method==='POST'?'resolution=merge-duplicates,return=minimal':''}};
  if(body)opts.body=JSON.stringify(body);
  try{const res=await fetch(SUPA_URL+'/rest/v1/'+table+extra,opts);const t=await res.text();return t?JSON.parse(t):[];}catch(e){return null;}
}

async function syncDB(){
  document.getElementById('sync-dot').className='sync-dot syncing';
  for(const f of db)await supaFetch('fm_foods','POST',{...f,user_id:USER_ID});
  document.getElementById('sync-dot').className='sync-dot';
  showToast('✅ Sincronizzati '+db.length+' alimenti!');
}

function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2800);}

mergeDB();renderFilters();renderList();
</script>
